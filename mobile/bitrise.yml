format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
workflows:
  primary:
    summary: Builds and tests the React Native application.
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - script@1:
        title: Install Dependencies
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            npm install
    - script@1:
        title: Run Tests
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            npm test
    - script@1:
        title: Build Android APK
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            export ANDROID_HOME="$HOME/Android/Sdk"
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            npx expo prebuild --platform android --no-install
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease
            mkdir -p ../artifacts
            cp app/build/outputs/apk/release/app-release.apk ../artifacts/ecoradius.apk
            echo "APK built successfully and copied to artifacts/ecoradius.apk"
